name: CI — POS Module

on:
  push:
    branches: [develop, main, 'feat/commerce-pos-*']
    paths:
      - 'src/modules/pos/**'
      - 'src/core/offline/**'
      - 'src/core/sync/**'
      - 'src/__mocks__/**'
      - 'workers/**'
      - '.github/workflows/ci-pos.yml'
  pull_request:
    branches: [develop, main]

concurrency:
  group: pos-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Type-check ──────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler (no emit)
        run: npm run typecheck

  # ─── Job 2: Unit tests + Coverage ──────────────────────────────────────────
  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run all unit tests
        run: npm test -- --reporter=verbose

      - name: Run with coverage
        run: npm run test:coverage -- --reporter=verbose

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 30

      - name: Coverage summary to job summary
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (x) => x.pct.toFixed(1) + '% (' + x.covered + '/' + x.total + ')';
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Lines | ' + fmt(s.lines) + ' |');
              console.log('| Functions | ' + fmt(s.functions) + ' |');
              console.log('| Branches | ' + fmt(s.branches) + ' |');
              console.log('| Statements | ' + fmt(s.statements) + ' |');
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage summary not found." >> $GITHUB_STEP_SUMMARY
          fi

  # ─── Job 3: POS-specific smoke tests ───────────────────────────────────────
  pos-smoke:
    name: POS API Smoke Tests
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run POS API tests only (targeted)
        run: |
          npm test -- \
            --reporter=verbose \
            src/modules/pos/api.test.ts \
            src/modules/pos/api.coverage.test.ts

      - name: Verify seed script is valid JS
        run: node --check workers/scripts/seed-pos-local.mjs

      - name: Dry-run seed script (stdout only — no D1 connection needed)
        run: |
          SEED_TENANT_ID=tnt_ci node workers/scripts/seed-pos-local.mjs > /tmp/seed-output.sql
          LINES=$(wc -l < /tmp/seed-output.sql)
          echo "Seed script produced $LINES SQL lines"
          grep -c "INSERT OR IGNORE" /tmp/seed-output.sql | xargs -I{} echo "INSERT statements: {}"
          # Verify exactly 200 INSERT statements
          COUNT=$(grep -c "INSERT OR IGNORE" /tmp/seed-output.sql)
          if [ "$COUNT" -ne "200" ]; then
            echo "ERROR: Expected 200 INSERT statements, got $COUNT"
            exit 1
          fi
          echo "✓ Seed script produces exactly 200 products"

  # ─── Job 4: Seed script validation ─────────────────────────────────────────
  seed-validation:
    name: Seed Script Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate seed SQL structure
        run: |
          node workers/scripts/seed-pos-local.mjs > /tmp/seed.sql

          echo "=== Seed validation ==="
          echo "Total lines: $(wc -l < /tmp/seed.sql)"
          echo "INSERT statements: $(grep -c 'INSERT OR IGNORE' /tmp/seed.sql)"

          # Check categories
          for cat in GROCERY FABRIC HOUSEHOLD ELECTRONICS PERSONAL_CARE STATIONERY; do
            COUNT=$(grep -c "$cat" /tmp/seed.sql)
            echo "Category $cat: $COUNT rows"
          done

          # Validate no NULL barcodes (all products must have barcodes for scanner testing)
          NULL_BARCODES=$(grep -c "NULL" /tmp/seed.sql || true)
          echo "Rows with NULL values: $NULL_BARCODES"

          # Confirm low-stock items present (quantity <= threshold)
          echo "Low-stock comment: $(grep 'Low-stock items' /tmp/seed.sql)"

  # ─── Job 5: E2E smoke (Playwright, chromium only) ──────────────────────────
  e2e-smoke:
    name: E2E Smoke Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Start dev server in background
        run: |
          npm run dev:ui &
          sleep 10
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:5173/ -o /dev/null -s
        env:
          NODE_ENV: test

      - name: Run POS E2E smoke tests
        run: npx playwright test playwright/pos-full-flow.spec.ts --project=chromium --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 7
