name = "webwaka-commerce-api"
main = "src/worker.ts"
compatibility_date = "2024-03-14"

# Staging Environment
[env.staging]
name = "webwaka-commerce-api-staging"
workers_dev = true

[env.staging.vars]
ENVIRONMENT = "staging"
# JWT_SECRET must be set via: wrangler secret put JWT_SECRET --env staging

kv_namespaces = [
  { binding = "TENANT_CONFIG", id = "018ac3a580104b8b8868712919be71bd" },
  { binding = "EVENTS", id = "ee8c49024b2d43a98c54962dba43f15b" },
  { binding = "SESSIONS_KV", id = "bde8befc71da40c5a5979ee35830022a" },
  { binding = "RATE_LIMIT_KV", id = "REPLACE_WITH_STAGING_RATE_LIMIT_KV_ID" }
]
[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-commerce-db-staging"
database_id = "f39bc175-4485-482a-ae87-b1195ead0ef3"

# Production Environment
[env.production]
name = "webwaka-commerce-api-prod"
workers_dev = true

[env.production.vars]
ENVIRONMENT = "production"
# JWT_SECRET must be set via: wrangler secret put JWT_SECRET --env production

kv_namespaces = [
  { binding = "TENANT_CONFIG", id = "e9a8b3178cf245a7815f4e5bf7e67299" },
  { binding = "EVENTS", id = "4e0bd5d5233f47dbaff75f8b10b89a8d" },
  { binding = "SESSIONS_KV", id = "f176cebbdf8445838c72d9fde0173628" },
  { binding = "RATE_LIMIT_KV", id = "REPLACE_WITH_PROD_RATE_LIMIT_KV_ID" }
]
[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-commerce-db-prod"
database_id = "1cc45df9-36e5-44d4-8a3b-e8377881c00b"
